[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_BASE_URL = "/api"

# /api → 공공데이터 API 프록시 (CORS 우회)
[[redirects]]
  from = "/api/*"
  to = "https://apis.data.go.kr/B551177/passgrAnncmt/:splat"
  status = 200
  force = true

# React SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
